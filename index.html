<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>你好，我是XXX 👋</h1>
    <p>欢迎来到我的个人网站</p>
</header>

<section>
    <div class="card">
        <h2>关于我</h2>
        <p>这里写你的介绍，比如：学生 / 开发者 / 爱好...</p>
    </div>

    <div class="card">
        <h2>我的项目</h2>
        <ul>
            <li>项目1</li>
            <li>项目2</li>
        </ul>
    </div>

    <div class="card">
        <h2>联系方式</h2>
        <p>Email: your@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 我的个人网站</p>
</footer>

</body>
</html>
